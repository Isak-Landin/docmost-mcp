services:
  # ------------------------------------------------------------
  # Docmost MCP
  # Connects directly to the live Docmost PostgreSQL database
  # and exposes container-hosted REST and MCP endpoints.
  # ------------------------------------------------------------
  docmost-mcp:
    container_name: docmost-mcp
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DOCMOST_DB_HOST: ${DOCMOST_DB_HOST}
      DOCMOST_DB_PORT: ${DOCMOST_DB_PORT}
      DOCMOST_DB_NAME: ${DOCMOST_DB_NAME}
      DOCMOST_DB_USER: ${DOCMOST_DB_USER}
      DOCMOST_DB_PASSWORD: ${DOCMOST_DB_PASSWORD}
      LISTEN_HOST: ${LISTEN_HOST:-0.0.0.0}
      LISTEN_PORT: ${LISTEN_PORT:-8099}
      DOCMOST_APP_URL: ${DOCMOST_APP_URL}
      DOCMOST_USER_EMAIL: ${DOCMOST_USER_EMAIL}
      DOCMOST_USER_PASSWORD: ${DOCMOST_USER_PASSWORD}
    ports:
      - "${EXTERNAL_PORT:-8099}:${LISTEN_PORT:-8099}"
    networks:
      - docmost_network

networks:
  # Shared network with the live Docmost stack.
  # The Docmost PostgreSQL container is reachable inside this network
  # via the hostname configured in DOCMOST_DB_HOST.
  # Set DOCMOST_NETWORK_NAME in .env to match your Docmost stack's Docker network.
  docmost_network:
    external: true
    name: ${DOCMOST_NETWORK_NAME:-docmost_default}
